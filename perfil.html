<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meu Perfil | Pedro Sites</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050712;--bg2:#080b18;--bg3:#0d1023;--card:#0f1228;
  --border:rgba(99,102,241,.14);--border2:rgba(99,102,241,.28);
  --accent:#6366f1;--accent2:#8b5cf6;--accent3:#a78bfa;
  --green:#22c55e;--red:#ef4444;
  --text:#f1f5f9;--muted:#94a3b8;
  --radius:14px;--font:'Syne',sans-serif;--inter:'Inter',sans-serif;
}
html,body{min-height:100%;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* BG */
.bg-blobs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(90px);animation:blobFloat 10s ease-in-out infinite}
.blob-1{width:500px;height:500px;background:rgba(99,102,241,.08);top:-150px;left:-80px}
.blob-2{width:420px;height:420px;background:rgba(139,92,246,.06);bottom:-100px;right:-60px;animation-delay:-5s}
@keyframes blobFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-24px)}}

/* TOPO */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem 2rem;
  background:rgba(5,7,18,.85);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);
}
.nav-logo{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-back{
  display:flex;align-items:center;gap:.4rem;
  font-size:.82rem;color:var(--muted);text-decoration:none;
  transition:color .2s;
}
.nav-back:hover{color:var(--text)}

/* LOADING */
#loadingScreen{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;
}
.spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MAIN */
main{
  position:relative;z-index:1;
  min-height:100vh;padding:6rem 1rem 3rem;
  display:flex;align-items:flex-start;justify-content:center;
}
.perfil-wrap{width:100%;max-width:520px;display:flex;flex-direction:column;gap:1.5rem}

/* CARD */
.card{
  background:linear-gradient(145deg,#0d1023,#080b18);
  border:1px solid var(--border2);border-radius:22px;
  padding:2rem;
  box-shadow:0 24px 60px rgba(0,0,0,.5);
}
.card-title{font-size:1rem;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:.5rem}
.card-title svg{opacity:.6}

/* AVATAR */
.avatar-section{display:flex;flex-direction:column;align-items:center;gap:1.25rem}
.avatar-wrap{position:relative;width:110px;height:110px}
.avatar-img{
  width:110px;height:110px;border-radius:50%;object-fit:cover;
  border:3px solid var(--border2);
  box-shadow:0 0 0 4px rgba(99,102,241,.12),0 8px 24px rgba(0,0,0,.4);
  background:#0d1023;
}
.avatar-placeholder{
  width:110px;height:110px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;font-weight:800;color:#fff;
  border:3px solid var(--border2);
  box-shadow:0 0 0 4px rgba(99,102,241,.12),0 8px 24px rgba(0,0,0,.4);
}
.avatar-edit-btn{
  position:absolute;bottom:2px;right:2px;
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:2px solid var(--bg);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 12px rgba(99,102,241,.4);
}
.avatar-edit-btn:hover{transform:scale(1.1);box-shadow:0 6px 16px rgba(99,102,241,.6)}
.avatar-edit-btn svg{width:14px;height:14px;color:#fff}
#fileInput{display:none}
.avatar-upload-hint{font-size:.75rem;color:var(--muted);text-align:center}

/* UPLOAD PROGRESS */
.upload-progress{
  width:100%;height:4px;background:var(--border);border-radius:999px;overflow:hidden;
  display:none;margin-top:.5rem;
}
.upload-progress.visible{display:block}
.upload-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;width:0%;transition:width .3s}

/* FORM */
.form-group{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
.form-label{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.form-input{
  background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:10px;padding:.75rem 1rem;color:var(--text);
  font-family:var(--inter);font-size:.9rem;outline:none;
  transition:border-color .2s,box-shadow .2s;width:100%;
}
.form-input:focus{border-color:rgba(99,102,241,.6);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.form-input:disabled{opacity:.5;cursor:not-allowed}

/* BOTÕES */
.btn{
  width:100%;padding:.85rem 1.5rem;border:none;border-radius:12px;
  font-family:var(--font);font-size:.9rem;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  box-shadow:0 8px 24px rgba(99,102,241,.35);
}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 12px 30px rgba(99,102,241,.5)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-danger{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
  color:#f87171;
}
.btn-danger:hover{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.4)}

/* STATUS */
.status{
  padding:.75rem 1rem;border-radius:10px;font-size:.85rem;font-family:var(--inter);
  font-weight:500;display:none;margin-bottom:1rem;
}
.status.visible{display:block}
.status.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:#4ade80}
.status.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171}

/* INFO ROW */
.info-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:.75rem 0;border-bottom:1px solid var(--border);
}
.info-row:last-child{border-bottom:none}
.info-label{font-size:.78rem;color:var(--muted);font-family:var(--inter)}
.info-value{font-size:.88rem;color:var(--text);font-weight:600;font-family:var(--inter)}
.badge-provider{
  display:inline-flex;align-items:center;gap:.3rem;
  background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);
  color:var(--accent3);border-radius:999px;padding:.2rem .7rem;font-size:.72rem;font-weight:700;
}
</style>
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
</div>

<!-- Loading -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <span style="color:var(--muted);font-size:.85rem">Carregando perfil...</span>
</div>

<!-- Nav -->
<nav>
  <a href="index.html" class="nav-back">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar ao site
  </a>
  <span class="nav-logo">Pedro Sites</span>
</nav>

<main>
  <div class="perfil-wrap">

    <!-- CARD FOTO -->
    <div class="card">
      <div class="card-title">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Foto de Perfil
      </div>

      <div class="avatar-section">
        <div class="avatar-wrap">
          <div class="avatar-placeholder" id="avatarPlaceholder">?</div>
          <img class="avatar-img" id="avatarImg" src="" alt="Foto de perfil" style="display:none"/>
          <label class="avatar-edit-btn" for="fileInput" title="Trocar foto">
            <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </label>
          <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/gif"/>
        </div>

        <div class="upload-progress" id="uploadProgress">
          <div class="upload-bar" id="uploadBar"></div>
        </div>

        <span class="avatar-upload-hint">JPG, PNG ou WEBP · máx. 2 MB</span>
      </div>
    </div>

    <!-- CARD EDITAR NOME -->
    <div class="card">
      <div class="card-title">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Editar Informações
      </div>

      <div id="statusMsg" class="status"></div>

      <div class="form-group">
        <label class="form-label" for="inputNome">Nome completo</label>
        <input class="form-input" type="text" id="inputNome" placeholder="Seu nome" maxlength="80"/>
      </div>

      <div class="form-group">
        <label class="form-label" for="inputEmail">E-mail</label>
        <input class="form-input" type="email" id="inputEmail" disabled/>
      </div>

      <button class="btn btn-primary" id="btnSalvar">Salvar alterações</button>
    </div>

    <!-- CARD INFORMAÇÕES -->
    <div class="card">
      <div class="card-title">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Informações da Conta
      </div>

      <div class="info-row">
        <span class="info-label">Membro desde</span>
        <span class="info-value" id="infoMembro">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Login via</span>
        <span class="info-value" id="infoProvider">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Status</span>
        <span class="info-value" style="color:var(--green)">✓ Ativo</span>
      </div>
    </div>

    <!-- CARD SAIR -->
    <div class="card">
      <button class="btn btn-danger" id="btnSair">Sair da conta</button>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL      = "https://lutmauhdvdcsblxuncbb.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_YkAUvidPMrZfQpWiA8Irhg_-3MXpAjh";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storageKey: "pedro_sites_auth" }
});

const BUCKET = "avatares";
let currentUser = null;

// Elementos
const loadingScreen   = document.getElementById("loadingScreen");
const avatarImg       = document.getElementById("avatarImg");
const avatarPlaceholder = document.getElementById("avatarPlaceholder");
const fileInput       = document.getElementById("fileInput");
const uploadProgress  = document.getElementById("uploadProgress");
const uploadBar       = document.getElementById("uploadBar");
const inputNome       = document.getElementById("inputNome");
const inputEmail      = document.getElementById("inputEmail");
const btnSalvar       = document.getElementById("btnSalvar");
const btnSair         = document.getElementById("btnSair");
const statusMsg       = document.getElementById("statusMsg");
const infoMembro      = document.getElementById("infoMembro");
const infoProvider    = document.getElementById("infoProvider");

function showStatus(msg, type) {
  statusMsg.textContent = msg;
  statusMsg.className = `status ${type} visible`;
  setTimeout(() => statusMsg.classList.remove("visible"), 4000);
}

function setAvatar(url, nome) {
  if (url) {
    avatarImg.src = url + "?t=" + Date.now();
    avatarImg.style.display = "block";
    avatarPlaceholder.style.display = "none";
  } else {
    avatarImg.style.display = "none";
    avatarPlaceholder.style.display = "flex";
    avatarPlaceholder.textContent = (nome || "?")[0].toUpperCase();
  }
}

function formatDate(dateStr) {
  if (!dateStr) return "—";
  return new Date(dateStr).toLocaleDateString("pt-BR", { day: "2-digit", month: "long", year: "numeric" });
}

// Carrega dados do usuário
async function loadProfile() {
  const { data: { session } } = await client.auth.getSession();

  if (!session) {
    window.location.href = "login.html";
    return;
  }

  currentUser = session.user;

  // Preenche campos
  inputEmail.value = currentUser.email || "";
  infoMembro.textContent = formatDate(currentUser.created_at);

  const provider = currentUser.app_metadata?.provider || "email";
  infoProvider.innerHTML = `<span class="badge-provider">${provider === "google" ? "🌐 Google" : "✉️ E-mail"}</span>`;

  // Busca perfil no banco
  const { data: profile } = await client
    .from("profiles")
    .select("full_name, avatar_url")
    .eq("id", currentUser.id)
    .single();

  const nome = profile?.full_name || currentUser.user_metadata?.full_name || "";
  inputNome.value = nome;
  setAvatar(profile?.avatar_url, nome);

  loadingScreen.style.display = "none";
}

// Upload de foto
fileInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  // Valida tamanho (2MB)
  if (file.size > 2 * 1024 * 1024) {
    showStatus("Imagem muito grande. Máximo 2 MB.", "error");
    return;
  }

  // Valida tipo
  if (!["image/jpeg","image/png","image/webp","image/gif"].includes(file.type)) {
    showStatus("Formato inválido. Use JPG, PNG ou WEBP.", "error");
    return;
  }

  uploadProgress.classList.add("visible");
  uploadBar.style.width = "30%";

  const ext = file.name.split(".").pop();
  const path = `${currentUser.id}/avatar.${ext}`;

  // Remove foto antiga se existir
  await client.storage.from(BUCKET).remove([path]);

  uploadBar.style.width = "60%";

  const { error: uploadError } = await client.storage
    .from(BUCKET)
    .upload(path, file, { upsert: true, contentType: file.type });

  if (uploadError) {
    showStatus("Erro ao enviar foto. Tente novamente.", "error");
    uploadProgress.classList.remove("visible");
    return;
  }

  uploadBar.style.width = "85%";

  // Pega URL pública
  const { data: { publicUrl } } = client.storage.from(BUCKET).getPublicUrl(path);

  // Atualiza no banco
  await client.from("profiles").upsert({
    id: currentUser.id,
    email: currentUser.email,
    avatar_url: publicUrl
  });

  uploadBar.style.width = "100%";
  setTimeout(() => uploadProgress.classList.remove("visible"), 600);

  setAvatar(publicUrl, inputNome.value);
  showStatus("Foto atualizada com sucesso!", "success");
  fileInput.value = "";
});

// Salvar nome
btnSalvar.addEventListener("click", async () => {
  const nome = inputNome.value.trim();
  if (!nome) { showStatus("Digite seu nome.", "error"); return; }

  btnSalvar.disabled = true;
  btnSalvar.textContent = "Salvando...";

  const { error } = await client.from("profiles").upsert({
    id: currentUser.id,
    email: currentUser.email,
    full_name: nome
  });

  btnSalvar.disabled = false;
  btnSalvar.textContent = "Salvar alterações";

  if (error) {
    showStatus("Erro ao salvar. Tente novamente.", "error");
  } else {
    // Atualiza inicial do placeholder
    avatarPlaceholder.textContent = nome[0].toUpperCase();
    showStatus("Nome atualizado com sucesso!", "success");
  }
});

// Sair
btnSair.addEventListener("click", async () => {
  await client.auth.signOut();
  window.location.href = "login.html";
});

// Inicia
loadProfile();
</script>
</body>
</html>
