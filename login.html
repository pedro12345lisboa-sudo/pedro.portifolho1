<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar | Pedro Sites</title>
  <meta name="description" content="Entre ou crie sua conta na Pedro Sites." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #050712;
      --bg-card:      #0f1120;
      --border:       rgba(99,102,241,0.18);
      --accent:       #6366f1;
      --accent-light: #818cf8;
      --text:         #f1f5f9;
      --text-muted:   #94a3b8;
      --text-dim:     #475569;
      --success:      #22c55e;
      --error:        #ef4444;
      --radius:       12px;
    }

    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

    /* BG */
    .bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .bg__grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px); background-size: 48px 48px; }
    .bg__blob { position: absolute; border-radius: 50%; filter: blur(80px); animation: float 8s ease-in-out infinite; }
    .bg__blob--1 { width: 500px; height: 500px; background: rgba(99,102,241,0.12); top: -150px; left: -100px; }
    .bg__blob--2 { width: 400px; height: 400px; background: rgba(139,92,246,0.08); bottom: -100px; right: -80px; animation-delay: -4s; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }

    /* LAYOUT */
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .back { position: fixed; top: 1.5rem; left: 1.5rem; display: flex; align-items: center; gap: .5rem; color: var(--text-muted); text-decoration: none; font-size: .875rem; font-weight: 500; transition: color .2s; z-index: 10; }
    .back:hover { color: var(--text); }

    /* CARD */
    .card { width: 100%; max-width: 420px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem 2rem; box-shadow: 0 24px 64px rgba(0,0,0,0.4), 0 0 80px rgba(99,102,241,0.06); animation: slideUp .5s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    /* LOGO */
    .logo { display: flex; align-items: center; justify-content: center; margin-bottom: 1.75rem; }
    .logo img { height: 52px; width: auto; }
    .logo__fallback { display: flex; align-items: center; gap: .75rem; }
    .logo__icon { width: 42px; height: 42px; background: linear-gradient(135deg,#6366f1,#8b5cf6); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; color: #fff; }
    .logo__text { font-weight: 700; font-size: 1.1rem; }

    /* TABS */
    .tabs { display: flex; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 4px; margin-bottom: 1.75rem; gap: 4px; }
    .tab { flex: 1; padding: .6rem; border: none; border-radius: 8px; font-family: inherit; font-size: .875rem; font-weight: 600; cursor: pointer; transition: all .2s; background: transparent; color: var(--text-muted); }
    .tab.active { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(99,102,241,0.35); }

    /* FORM */
    .form { display: flex; flex-direction: column; gap: 1rem; }
    .field { display: flex; flex-direction: column; gap: .4rem; }
    .label { font-size: .8rem; font-weight: 600; color: var(--text-muted); }
    .input-wrap { position: relative; }
    .input-wrap svg { position: absolute; left: .875rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); width: 16px; height: 16px; pointer-events: none; }
    .input { width: 100%; padding: .75rem .875rem .75rem 2.5rem; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: inherit; font-size: .9rem; transition: border-color .2s, box-shadow .2s; outline: none; }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .input::placeholder { color: var(--text-dim); }

    /* Senha toggle */
    .toggle-pass { position: absolute; right: .875rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-dim); transition: color .2s; padding: 0; display: flex; }
    .toggle-pass:hover { color: var(--text-muted); }

    /* BOTÃO PRINCIPAL */
    .btn-primary { width: 100%; padding: .875rem; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: inherit; font-size: .95rem; font-weight: 700; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: .5rem; margin-top: .25rem; }
    .btn-primary:hover { background: var(--accent-light); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .btn-primary .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
    .btn-primary.loading .spinner { display: block; }
    .btn-primary.loading .btn-label { display: none; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* DIVISOR */
    .divider { display: flex; align-items: center; gap: 1rem; color: var(--text-dim); font-size: .8rem; margin: .25rem 0; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--border); }

    /* BOTÃO GOOGLE */
    .btn-google { width: 100%; display: flex; align-items: center; justify-content: center; gap: .75rem; padding: .8rem 1.5rem; background: #fff; color: #1f2937; border: none; border-radius: var(--radius); font-size: .9rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: all .2s; }
    .btn-google:hover { background: #f9fafb; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
    .btn-google:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* STATUS */
    .status { padding: .75rem 1rem; border-radius: 10px; font-size: .85rem; font-weight: 500; text-align: center; display: none; margin-top: .5rem; }
    .status.error { display:block; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.25); color:#fca5a5; }
    .status.success { display:block; background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.25); color:#86efac; }

    /* RODAPÉ */
    .card__footer { margin-top: 1.5rem; text-align: center; font-size: .8rem; color: var(--text-dim); line-height: 1.6; }
    .card__footer a { color: var(--accent-light); text-decoration: none; }
    .card__footer a:hover { text-decoration: underline; }

    /* CAMPO NOME (só no cadastro) */
    .field--name { display: none; }
    .field--name.visible { display: flex; }

    /* ESQUECI A SENHA */
    .forgot { text-align: right; margin-top: -.5rem; }
    .forgot a { font-size: .8rem; color: var(--accent-light); text-decoration: none; }
    .forgot a:hover { text-decoration: underline; }
    .forgot--hidden { display: none; }

    /* FORÇA DE SENHA (indicador visual) */
    .password-strength { display: none; gap: .5rem; align-items: center; margin-top: .5rem; }
    .password-strength.visible { display: flex; }
    .strength-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0%; transition: width .3s, background-color .3s; }
    .strength-fill.very-weak { width: 20%; background: #ef4444; }
    .strength-fill.weak { width: 40%; background: #f97316; }
    .strength-fill.moderate { width: 60%; background: #eab308; }
    .strength-fill.strong { width: 80%; background: #84cc16; }
    .strength-fill.very-strong { width: 100%; background: #22c55e; }
    .strength-label { font-size: .75rem; color: var(--text-muted); min-width: 70px; }

    /* REQUISITOS DE SENHA */
    .password-requirements { display: none; gap: .4rem; margin-top: .6rem; padding: .75rem; background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.12); border-radius: 8px; }
    .password-requirements.visible { display: flex; flex-direction: column; }
    .requirement { font-size: .75rem; color: var(--text-dim); display: flex; align-items: center; gap: .4rem; }
    .requirement.met { color: var(--success); }
    .requirement.unmet { color: var(--error); }
    .requirement-icon { width: 14px; height: 14px; flex-shrink: 0; }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.25rem; border-radius: 16px; }
      .back { top: 1rem; left: 1rem; }
    }
  </style>
</head>
<body>
  <!-- 3D Background Canvas -->
  <canvas id="bg3d" aria-hidden="true"></canvas>

<div class="bg">
  <div class="bg__grid"></div>
  <div class="bg__blob bg__blob--1"></div>
  <div class="bg__blob bg__blob--2"></div>
</div>

<a class="back" href="index.html">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  Voltar ao site
</a>

<main class="page">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <img src="logo.png" alt="Pedro Sites" onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex'" />
      <div class="logo__fallback" id="logoFallback" style="display:none">
        <div class="logo__icon">PS</div>
        <span class="logo__text">Pedro Sites</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs" role="tablist">
      <button class="tab active" id="tabLogin" role="tab" aria-selected="true" type="button">Entrar</button>
      <button class="tab" id="tabRegister" role="tab" aria-selected="false" type="button">Criar conta</button>
    </div>

    <!-- Formulário -->
    <form class="form" id="authForm" novalidate>

      <!-- Nome (só no cadastro) -->
      <div class="field field--name" id="fieldName">
        <label class="label" for="inputName">Seu nome</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input class="input" id="inputName" type="text" placeholder="Seu nome completo" autocomplete="name" maxlength="80" />
        </div>
      </div>

      <!-- Email -->
      <div class="field">
        <label class="label" for="inputEmail">E-mail</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input class="input" id="inputEmail" type="email" placeholder="seu@email.com" autocomplete="email" required />
        </div>
      </div>

      <!-- Senha -->
      <div class="field">
        <label class="label" for="inputPassword">Senha</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input class="input" id="inputPassword" type="password" placeholder="Mínimo 8 caracteres" autocomplete="current-password" required minlength="8" />
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar senha">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <!-- Indicador de Força da Senha -->
      <div class="password-strength" id="passwordStrength">
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <span class="strength-label" id="strengthLabel">-</span>
      </div>

      <!-- Requisitos de Senha (apenas no cadastro) -->
      <div class="password-requirements" id="passwordRequirements"></div>

      <!-- Esqueci a senha (só no login) -->
      <div class="forgot" id="forgotWrap">
        <a href="#" id="forgotLink">Esqueci minha senha</a>
      </div>

      <!-- Botão principal -->
      <button class="btn-primary" id="btnSubmit" type="submit">
        <span class="btn-label" id="btnLabel">Entrar</span>
        <div class="spinner"></div>
      </button>

    </form>

    <!-- Divisor -->
    <div class="divider">ou continue com</div>

    <!-- Google -->
    <button class="btn-google" id="btnGoogle" type="button">
      <svg viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 8 3l5.7-5.7C34.1 6.1 29.2 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16.1 19 12 24 12c3.1 0 5.8 1.2 8 3l5.7-5.7C34.1 6.1 29.2 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.1 0 9.8-1.9 13.3-5.1l-6.1-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.7-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3a12.1 12.1 0 01-4.1 5.7l6.1 5.2C36.9 39.3 44 34 44 24c0-1.3-.1-2.7-.4-3.9z"/>
      </svg>
      Entrar com Google
    </button>

    <!-- Status -->
    <div class="status" id="statusMsg"></div>

    <!-- Rodapé -->
    <p class="card__footer">
      Dúvidas? <a href="https://wa.me/556199070566" target="_blank" rel="noopener">Fale pelo WhatsApp</a>
    </p>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="passwordValidation.js"></script>
<script>
  const SUPABASE_URL      = "https://gpmxniygvnwkqrgbcyjo.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_1KnTNp8Lhh9GfVhNPUKY6Q_HkpyMIBY";

  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storageKey: "pedro_sites_auth" }
  });

  // Elementos
  const tabLogin    = document.getElementById("tabLogin");
  const tabRegister = document.getElementById("tabRegister");
  const fieldName   = document.getElementById("fieldName");
  const forgotWrap  = document.getElementById("forgotWrap");
  const forgotLink  = document.getElementById("forgotLink");
  const btnSubmit   = document.getElementById("btnSubmit");
  const btnLabel    = document.getElementById("btnLabel");
  const btnGoogle   = document.getElementById("btnGoogle");
  const statusMsg   = document.getElementById("statusMsg");
  const inputEmail  = document.getElementById("inputEmail");
  const inputPass   = document.getElementById("inputPassword");
  const inputName   = document.getElementById("inputName");
  const togglePass  = document.getElementById("togglePass");

  let mode = "login"; // "login" | "register"

  // Inicializa validador de senha
  const pwValidator = new PasswordValidator("https://pedro-portifolho.onrender.com/api/auth");

  // Se já logado, redireciona
  client.auth.getSession().then(({ data }) => {
    if (data?.session) window.location.href = "index.html";
  });

  // Captura retorno OAuth
  client.auth.onAuthStateChange((event, session) => {
    if (event === "SIGNED_IN" && session) {
      showStatus("Login realizado! Redirecionando...", "success");
      setTimeout(() => { window.location.href = "index.html"; }, 1000);
    }
  });

  // Tabs
  tabLogin.addEventListener("click", () => setMode("login"));
  tabRegister.addEventListener("click", () => setMode("register"));

  function setMode(m) {
    mode = m;
    tabLogin.classList.toggle("active", m === "login");
    tabRegister.classList.toggle("active", m === "register");
    fieldName.classList.toggle("visible", m === "register");
    forgotWrap.classList.toggle("forgot--hidden", m === "register");
    btnLabel.textContent = m === "login" ? "Entrar" : "Criar conta";
    inputPass.autocomplete = m === "login" ? "current-password" : "new-password";
    clearStatus();
  }

  // Toggle senha
  togglePass.addEventListener("click", () => {
    const show = inputPass.type === "password";
    inputPass.type = show ? "text" : "password";
    togglePass.setAttribute("aria-label", show ? "Ocultar senha" : "Mostrar senha");
  });

  // Validação de força de senha em tempo real
  inputPass.addEventListener("input", () => {
    const password = inputPass.value;
    
    if (!password) {
      document.getElementById("passwordStrength").classList.remove("visible");
      document.getElementById("passwordRequirements").classList.remove("visible");
      return;
    }

    // Valida localmente
    const validation = pwValidator.validateStrength(password);

    // Mostra indicador de força
    const strengthEl = document.getElementById("passwordStrength");
    const fillEl = document.getElementById("strengthFill");
    const labelEl = document.getElementById("strengthLabel");

    strengthEl.classList.add("visible");
    fillEl.className = `strength-fill ${validation.strength.replace(" ", "-")}`;
    labelEl.textContent = `${validation.strength} (${validation.score}%)`;

    // Mostra requisitos (apenas no cadastro)
    if (mode === "register") {
      const reqsEl = document.getElementById("passwordRequirements");
      reqsEl.classList.add("visible");
      reqsEl.innerHTML = validation.passedTests
        .concat(validation.errors)
        .map((req) => {
          const isMet = validation.passedTests.includes(req);
          return `<div class="requirement ${isMet ? "met" : "unmet"}">
            <span class="requirement-icon">${isMet ? "✓" : "✗"}</span>
            ${req}
          </div>`;
        })
        .join("");
    }
  });

  // Esqueci senha
  forgotLink.addEventListener("click", async (e) => {
    e.preventDefault();
    const email = inputEmail.value.trim();
    if (!email) { showStatus("Digite seu e-mail primeiro.", "error"); return; }
    const { error } = await client.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + "/login.html"
    });
    if (error) showStatus("Erro ao enviar e-mail. Verifique o endereço.", "error");
    else showStatus("E-mail de recuperação enviado! Verifique sua caixa.", "success");
  });

  // Submit
  document.getElementById("authForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = inputEmail.value.trim();
    const pass  = inputPass.value;
    const name  = inputName.value.trim();

    if (!email || !pass) { showStatus("Preencha e-mail e senha.", "error"); return; }
    if (mode === "register" && !name) { showStatus("Digite seu nome.", "error"); return; }

    // Valida força da senha (especialmente no cadastro)
    const validation = pwValidator.validateStrength(pass);
    if (mode === "register" && !validation.isValid) {
      showStatus(`Senha fraca. Requisitos: ${validation.errors.join(", ")}`, "error");
      return;
    }

    // Verifica rate limiting
    const attemptCheck = await pwValidator.checkLoginAttempts(email);
    if (attemptCheck.blocked) {
      const minutos = Math.ceil(attemptCheck.nextAttemptIn / 60000);
      showStatus(`Muitas tentativas. Tente novamente em ${minutos} minutos.`, "error");
      return;
    }

    setLoading(true);
    clearStatus();

    // Registra a tentativa
    await pwValidator.recordLoginAttempt(email);

    if (mode === "login") {
      const { error } = await client.auth.signInWithPassword({ email, password: pass });
      if (error) {
        setLoading(false);
        showStatus(translateError(error.message), "error");
      }
    } else {
      // Validação extra para cadastro
      if (validation.score < 60) {
        setLoading(false);
        showStatus("Sua senha não é forte o suficiente. Use maiúsculas, números e símbolos.", "error");
        return;
      }

      const { error } = await client.auth.signUp({
        email, password: pass,
        options: { data: { full_name: name, name } }
      });
      if (error) {
        setLoading(false);
        showStatus(translateError(error.message), "error");
      } else {
        setLoading(false);
        showStatus("Conta criada! Verifique seu e-mail para confirmar o cadastro.", "success");
      }
    }
  });

  // Google
  btnGoogle.addEventListener("click", async () => {
    btnGoogle.disabled = true;
    const { error } = await client.auth.signInWithOAuth({
      provider: "google",
      options: { redirectTo: window.location.origin + "/index.html" }
    });
    if (error) {
      showStatus("Erro ao abrir login com Google.", "error");
      btnGoogle.disabled = false;
    }
  });

  // Helpers
  function setLoading(on) {
    btnSubmit.disabled = on;
    btnSubmit.classList.toggle("loading", on);
  }

  function showStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className   = `status ${type}`;
  }

  function clearStatus() {
    statusMsg.textContent = "";
    statusMsg.className   = "status";
  }

  function translateError(msg) {
    if (msg.includes("Invalid login")) return "E-mail ou senha incorretos.";
    if (msg.includes("Email not confirmed")) return "Confirme seu e-mail antes de entrar.";
    if (msg.includes("User already registered")) return "E-mail já cadastrado. Faça login.";
    if (msg.includes("Password should be")) return "A senha deve ter pelo menos 6 caracteres.";
    if (msg.includes("rate limit")) return "Muitas tentativas. Aguarde um momento.";
    return "Ocorreu um erro. Tente novamente.";
  }
</script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="three-bg.js" defer></script>
</body>
</html>
